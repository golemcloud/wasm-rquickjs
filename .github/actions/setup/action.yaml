name: "Setup Build Environment"
description: "Shared setup for Rust, WASI SDK, and cargo-component"

inputs:
  cache-key:
    description: "Shared cache key for rust-cache"
    required: false
    default: "debug"

runs:
  using: "composite"
  steps:
    - uses: useblacksmith/rust-cache@v3
      with:
        prefix-key: v1-rust
        shared-key: ${{ inputs.cache-key }}
        cache-all-crates: true
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-wasip1, wasm32-wasip2
    - uses: cargo-bins/cargo-binstall@main
    - name: Install cargo-component
      shell: bash
      run: cargo binstall --force --locked cargo-component@0.21.1
    - name: Install WASI SDK
      shell: bash
      run: |
        curl -sSfL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz | sudo tar xz -C /opt
        sudo mv /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk
