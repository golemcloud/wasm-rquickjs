services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1884:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    tmpfs:
      - /mosquitto/data
      - /mosquitto/log
