services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "56720:5672"
      - "25672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: testuser
      RABBITMQ_DEFAULT_PASS: testpass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 15
    tmpfs:
      - /var/lib/rabbitmq/mnesia
